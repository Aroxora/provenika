name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, type-check & test (Node)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build (tsc)
        run: npm run build
      - name: Medical-safety audit (no undisclaimed dosing / treatment advice / prognosis)
        run: node cicd/audit_medical_safety.cjs
      - name: Cheminformatics data contract (Python producer ↔ web ChemInfo consumer)
        run: node cicd/check_cheminformatics_contract.cjs
      - name: Type-check
        run: npx tsc --noEmit
      - name: Test
        # --ci + --forceExit because the suite has a known teardown handle leak
        # (a worker doesn't exit gracefully); tests themselves pass.
        run: npm test -- --ci --forceExit

  cad-tools:
    name: CAD tools (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax-check all Python
        run: python -m compileall -q cad cicd outreach
      - name: Smoke-test cost-benefit (offline, deterministic)
        run: |
          python3 cad/cost_benefit.py --modality small_molecule --phase phase1 \
            --incidence 60000 --price 150000 --json
      - name: Smoke-test CLI help paths
        run: |
          python3 cad/virtual_triage.py --help >/dev/null
          python3 cad/target_report.py --help >/dev/null
          python3 cad/fetch_structure.py --help >/dev/null
          python3 cad/dock.py --help >/dev/null
          python3 cad/news_update.py --help >/dev/null
          python3 cad/cheminformatics.py --help >/dev/null
          python3 cad/binding_site.py --help >/dev/null
          python3 cad/precompute_site_data.py --help >/dev/null
      - name: Cheminformatics (real RDKit, deterministic offline)
        run: |
          pip install --quiet rdkit
          python3 cad/cheminformatics.py --smiles "CC(=O)Oc1ccccc1C(=O)O" --json \
            | python3 -c "import sys,json; r=json.load(sys.stdin)['results'][0]; assert r['lipinski_ok'] and 170<r['mw']<190, r; print('cheminformatics OK:', r['mw'], r['qed'])"
      - name: Cheminformatics LE + chemotype clustering (offline)
        run: |
          printf 'smiles,best_pchembl,chembl_id\nCC(=O)Oc1ccccc1C(=O)O,7.0,A\nO=C(O)c1ccccc1O,6.5,B\nCCO,5.0,C\n' > /tmp/t.csv
          python3 cad/cheminformatics.py --csv /tmp/t.csv --json | python3 -c "
          import sys,json
          rs=json.load(sys.stdin)['results']
          assert len(rs)==3, rs
          assert all('le' in r and 'lle' in r and isinstance(r['cluster'],int) for r in rs), rs
          print('LE+cluster OK:', [(r['id'], r['le'], r['cluster']) for r in rs])"
      - name: Cheminformatics formula known-value tests (LE/LLE)
        run: python3 cad/test_cheminformatics.py
      - name: Anti-hallucination enforcement tests (offline)
        run: python3 cad/test_provenance.py
      - name: Verifier cross-checks provenance.json against the artifacts (offline)
        run: python3 cad/test_verify_manifest.py
      - name: Verifier independently re-fetches hit QED from ChEMBL (offline, mocked)
        run: python3 cad/test_verify_hits.py
      - name: Mutation/variant parser (allele-specific oncology queries, offline)
        run: python3 cad/test_mutations.py
      - name: Triage data-quality — median aggregation, quality gate, variant filter, max_phase (offline, mocked)
        run: python3 cad/test_triage_filters.py
      - name: Validation harness — enrichment guard + leakage refusal (offline, mocked)
        run: python3 cad/test_validate.py
      - name: Batch-dock stage — gating + rank fusion (offline, Vina stubbed)
        run: python3 cad/test_batch_dock.py
      - name: Explanation layer — LLM number-guard forbids new figures (offline)
        run: python3 cad/test_explain.py
      - name: News fact-check gate — independent-source corroboration (offline, Tavily stubbed)
        run: python3 cad/test_news_update.py
      - name: Stdlib-only guarantee (cad/ imports + degrades without RDKit)
        run: python3 cad/test_no_rdkit.py
      - name: Graceful degradation (single data-source outage → partial dossier, not a crash)
        run: python3 cad/test_degradation.py
      - name: Precompute never shrinks the committed /explore set (flaky-ChEMBL guard, offline)
        run: python3 cad/test_precompute_index.py
      - name: Target resolution prefers exact gene symbol (no substrate/interactor mis-match, offline)
        run: python3 cad/test_resolve_target.py
      - name: Target dossier ranking also uses the exact gene-symbol guard (cross-stage match, offline)
        run: python3 cad/test_target_report.py
      - name: Docking box picks the buried drug-like ligand, not the largest additive (offline)
        run: python3 cad/test_binding_site.py
      - name: Structure pick is coverage-aware + AlphaFold pLDDT is read (offline)
        run: python3 cad/test_fetch_structure.py
      - name: Docking blind-box uses a real Vina box, not the unsupported --autobox flag (offline)
        run: python3 cad/test_dock.py
      - name: Validation harness metric math — ROC AUC / enrichment / pose-RMSD (offline)
        run: python3 cad/validate.py --self-test
      - name: Docking-grade ligand prep (Meeko) regression — guards the validated ~1.4A path
        run: |
          python3 -m pip install --quiet meeko pdb2pqr rdkit || true
          python3 cad/test_dock_meeko.py
      - name: Outreach agent E2E + edge cases (offline, no network, never sends)
        run: python3 outreach/test_e2e.py
      - name: Verify a deterministic artifact end-to-end (offline)
        run: |
          mkdir -p /tmp/run
          python3 cad/cost_benefit.py --modality small_molecule --phase phase1 \
            --incidence 60000 --price 150000 --json > /tmp/run/cost_benefit.json
          python3 cad/verify.py --run /tmp/run --json | python3 -c "
          import sys,json; r=json.load(sys.stdin)
          assert r['ok'] and r['fail']==0, r
          print('verify gate OK:', [(c['figure'], c['status']) for c in r['checks']])"

  web-build:
    name: Build & test web app (Angular)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Unit tests (vitest — incl. math-models known-value checks)
        run: npx ng test --no-watch
      - run: npx ng build --configuration production
